<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Test</title>
<style>
  body { background: #333; display: flex; justify-content: center; align-items: center; padding: 50px; }
  .card { width: 500px; background: #000; border: 2px solid green; border-radius: 12px; overflow: hidden; }
  .vid-container { position: relative; width: 100%; aspect-ratio: 9/16; }
  iframe { border: none; overflow: hidden; }
</style>
</head>
<body>

<div class="card">
  <!-- Test 1: Fixed dimensions -->
  <div style="height: 476px; display: flex; justify-content: center;">
    <iframe src="https://www.facebook.com/plugins/video.php?height=476&href=https%3A%2F%2Fwww.facebook.com%2Freel%2F1801707910382021%2F&show_text=false&width=267&t=0" width="267" height="476" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
  </div>

  <h2>Test 2: Scaled</h2>
  <div style="position: relative; width: 100%; padding-top: 178%; /* 16/9 = 1.777 */">
    <iframe src="https://www.facebook.com/plugins/video.php?href=https%3A%2F%2Fwww.facebook.com%2Freel%2F1801707910382021%2F&show_text=false" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
  </div>
</div>

</body>
</html>
